<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lichtspiel — p5 runtime</title>

  <body>
    <!-- p5 mounts its canvas here (instance mode). -->
    <div id="stage"></div>

    <!-- Diagnostics / HUD overlay (toggle with `d`). -->

    <!-- Connection pill -->
    <div id="conn" class="conn">browser-only</div>

    <script type="module" src="/src/main.ts"></script>
